version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: main_project_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=main_project
    ports:
      # - "5433:5432"
      - "5432:5432" # Map container port 5432 to host 5433 to match .env DATABASE_URL
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d main_project"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: